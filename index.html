<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Clínica Digital</title>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3022/3022215.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3022/3022215.png">
    <meta name="theme-color" content="#1d4f73">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef3f8;
            margin: 0;
            padding: 25px;
            color: #2b3a4a;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #1d4f73;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 22px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
            color: #516273;
        }

        input, select, textarea {
            width: 100%;
            padding: 11px;
            border: 1px solid #d3dbe4;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box; /* Asegura que el padding no rompa el diseño */
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }

        .primary-btn {
            background: #1d4f73;
            color: white;
            margin-top: 18px;
        }

        .primary-btn:hover {
            background: #153c57;
        }

        .delete-btn {
            background: #d9534f;
            color: white;
            padding: 8px 12px;
        }

        .delete-btn:hover {
            background: #b93e3a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e5ebf1;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #edf4fa;
            color: #1d4f73;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .ok { background: #daf5e4; color: #19703c; }
        .warning { background: #fff2cc; color: #8a6a00; }
        .error { background: #ffdada; color: #a12626; }

        .summary {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .summary-box {
            flex: 1;
            min-width: 180px;
            background: #f6f9fc;
            border-radius: 14px;
            padding: 18px;
            text-align: center;
        }

        .summary-box h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #5b6b7a;
        }

        .summary-box p {
            font-size: 28px;
            font-weight: bold;
            color: #1d4f73;
            margin: 0;
        }

        @media(max-width:700px){
            body { padding: 15px; }
            table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>📋 Auditoría Clínica Digital</h1>

    <div class="card">
        <h2>Nueva revisión</h2>

        <div class="form-grid">
            <div>
                <label>Área auditada</label>
                <select id="area">
                    <option>Laboratorio clínico</option>
                    <option>Recepción</option>
                    <option>Sala de muestras</option>
                    <option>Farmacia</option>
                    <option>Urgencias</option>
                </select>
            </div>

            <div>
                <label>Elemento revisado</label>
                <input type="text" id="elemento" placeholder="Ej: Etiquetado de muestras">
            </div>

            <div>
                <label>Estado</label>
                <select id="estado">
                    <option>Cumple</option>
                    <option>Parcial</option>
                    <option>No cumple</option>
                </select>
            </div>

            <div>
                <label>Fecha</label>
                <input type="date" id="fecha">
            </div>
        </div>

        <div style="margin-top:16px;">
            <label>Observaciones del auditor</label>
            <textarea id="observaciones" placeholder="Describe lo que encontraste..."></textarea>
        </div>

        <div style="margin-top:16px;">
            <label>Acción correctiva sugerida</label>
            <textarea id="accion" placeholder="Ej: Reentrenar al personal y revisar protocolo"></textarea>
        </div>

        <button class="primary-btn" onclick="guardarAuditoria()">
            Guardar auditoría
        </button>
    </div>

    <div class="card">
        <h2>📊 Resumen</h2>

        <div class="summary">
            <div class="summary-box">
                <h3>Total revisiones</h3>
                <p id="total">0</p>
            </div>

            <div class="summary-box">
                <h3>Cumple</h3>
                <p id="cumple">0</p>
            </div>

            <div class="summary-box">
                <h3>Parcial</h3>
                <p id="parcial">0</p>
            </div>

            <div class="summary-box">
                <h3>No cumple</h3>
                <p id="nocumple">0</p>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>🗂 Historial de auditorías</h2>

        <table>
            <thead>
                <tr>
                    <th>Área</th>
                    <th>Elemento</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Observaciones</th>
                    <th>Acción correctiva</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tablaAuditorias"></tbody>
        </table>
    </div>

</div>

<script>
let auditorias = JSON.parse(localStorage.getItem("auditoriasClinicas")) || [];

function renderizar() {
    const tabla = document.getElementById("tablaAuditorias");
    tabla.innerHTML = "";

    let cumple = 0;
    let parcial = 0;
    let nocumple = 0;

    auditorias.forEach((a, index) => {

        let clase = "";

        if(a.estado === "Cumple"){
            clase = "ok";
            cumple++;
        } else if(a.estado === "Parcial"){
            clase = "warning";
            parcial++;
        } else {
            clase = "error";
            nocumple++;
        }

        tabla.innerHTML += `
            <tr>
                <td>${a.area}</td>
                <td>${a.elemento}</td>
                <td><span class="badge ${clase}">${a.estado}</span></td>
                <td>${a.fecha}</td>
                <td>${a.observaciones}</td>
                <td>${a.accion}</td>
                <td>
                    <button class="delete-btn" onclick="eliminar(${index})">
                        Eliminar
                    </button>
                </td>
            </tr>
        `;
    });

    document.getElementById("total").textContent = auditorias.length;
    document.getElementById("cumple").textContent = cumple;
    document.getElementById("parcial").textContent = parcial;
    document.getElementById("nocumple").textContent = nocumple;
}

function guardarAuditoria() {
    const area = document.getElementById("area").value;
    const elemento = document.getElementById("elemento").value;
    const estado = document.getElementById("estado").value;
    const fecha = document.getElementById("fecha").value;
    const observaciones = document.getElementById("observaciones").value;
    const accion = document.getElementById("accion").value;

    if(!elemento || !fecha || !observaciones){
        alert("Completa los campos obligatorios 🙂");
        return;
    }

    auditorias.push({
        area,
        elemento,
        estado,
        fecha,
        observaciones,
        accion
    });

    localStorage.setItem("auditoriasClinicas", JSON.stringify(auditorias));

    // Limpiar campos
    document.getElementById("elemento").value = "";
    document.getElementById("fecha").value = "";
    document.getElementById("observaciones").value = "";
    document.getElementById("accion").value = "";

    renderizar();
}

function eliminar(index){
    if(confirm("¿Estás seguro de eliminar este registro?")) {
        auditorias.splice(index, 1);
        localStorage.setItem("auditoriasClinicas", JSON.stringify(auditorias));
        renderizar();
    }
}

// Carga inicial
renderizar();
</script>

</body>
</html>
